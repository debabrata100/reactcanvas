name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Package .vsix
        run: npx @vscode/vsce package --out reactcanvas-${{ github.ref_name }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: reactcanvas-${{ github.ref_name }}.vsix
          generate_release_notes: true

      - name: Check for Marketplace token
        id: pat
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -n "$VSCE_PAT" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VSCE_PAT secret not set — skipping Marketplace publish."
          fi

      - name: Publish to VS Code Marketplace
        if: steps.pat.outputs.present == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath reactcanvas-${{ github.ref_name }}.vsix

      - name: Check for Open VSX token
        id: ovsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -n "$OVSX_PAT" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::OVSX_PAT secret not set — skipping Open VSX publish."
          fi

      - name: Publish to Open VSX
        if: steps.ovsx.outputs.present == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish reactcanvas-${{ github.ref_name }}.vsix -p "$OVSX_PAT"
